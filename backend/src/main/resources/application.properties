# Server port
server.port=8080

# H2 Database Settings
spring.datasource.url=jdbc:h2:file:./data/drumdb;AUTO_RECONNECT=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.sql-script-encoding=UTF-8

# Initialize Database from schema.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# H2 Console Settings (Access via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# MyBatis Settings
mybatis.configuration.map-underscore-to-camel-case=true

# Logging SQL for debugging
logging.level.web=INFO
logging.level.com.example.drum.mapper=DEBUG
